#
# ZFS 根「引导器之前」处理(shellprocess@zfspre 实例;在 settings.conf instances: 注册、sequence: 接入)。
#
# 序列位置(关键):本实例必须排在 grubcfg / bootloader 【之前】。原因:ZFS 根安装时 bootloader 模块
# 仍会跑 grub-install,但 GRUB 读不了 ZFS 池(尤其原生加密)→ grub-install 退 1 → bootloader 失败 →
# Calamares 致命中止(实测:安装失败/启动加载器安装出错),装 ZBM 的 shellprocess@zfs 根本轮不到。
# 本步在它们之前把 grub-install/grub-mkconfig 临时中和为 no-op,让 grubcfg/bootloader 空跑成功;
# ZFSBootMenu 由其后的 shellprocess@zfs 安装并把这两个工具还原。
#
# 仅 ZFS 根触发:门控在脚本内(findmnt -no FSTYPE / | grep zfs);非 ZFS 安装直接退出、grub 照常安装。
# 脚本由 Live-ISO 经 include-squashfs 随 squashfs 进目标 /usr/local/bin;执行后自删,不进装好系统。
---
dontChroot: false
timeout: 60
script:
    - command: "-test -x /usr/local/bin/gigos-zfs-prebootloader.sh && /usr/local/bin/gigos-zfs-prebootloader.sh"
      timeout: 60

i18n:
    name: "Preparing ZFS boot (ZFSBootMenu)"
    name[zh_CN]: "准备 ZFS 引导(ZFSBootMenu)"
    name[zh_TW]: "準備 ZFS 引導(ZFSBootMenu)"
