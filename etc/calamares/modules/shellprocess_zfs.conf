#
# ZFS 根装机后处理(shellprocess@zfs 实例;在 settings.conf 的 instances: 注册、sequence: 接入)。
#
# 仅 ZFS 根触发:实际门控在脚本内(findmnt -no FSTYPE / | grep -qx zfs,非 ZFS 直接 exit 0),
# 故本步对 ext4/xfs/btrfs/LUKS 安装彻底 no-op——与 shellprocess@nvidia 同套「先探针、命中才动」思路。
#
# 序列位置(关键):本实例在 settings.conf 里【接在 grubcfg/bootloader 之后】。原因是 bootloader.conf
# installEFIFallback:true → GRUB 模块会把 GRUB 写进 ESP 的 EFI/BOOT/BOOTX64.EFI 和 NVRAM;GRUB 读不了
# ZFS 池,若让 GRUB 后写就会盖掉/抢先于 ZBM。放在 bootloader 之后,脚本才能拆掉 GRUB 在 ESP/NVRAM 的
# 引导物、再把 ZBM 写成最后生效者(最后写胜)。非 ZFS 安装该脚本直接退出,GRUB 引导物原样保留。
#
# 脚本干 Calamares 原生模块做不了、且每件都对应一个 ZFS 首启失败坑的事:
#   1. hostid:目标 /etc/hostid 与建池 hostid 一致并打进目标 initramfs(否则首启 import 失败)
#   2. 首启导入靠 hostid + import-scan(不烘 altroot 下生成的 zpool.cache,避免污染卡住)
#   3. 原生加密:改 keyfile 解锁(仅入目标 initramfs),ZBM 处提示一次口令——消除双重口令提示
#   4. ZFSBootMenu(UEFI):generate-zbm 生成单文件 EFI、装进 ESP、efibootmgr 建项、置 bootfs;并拆 GRUB
#
# 脚本由 Live-ISO 经 include-squashfs 随 squashfs 整盘复制进目标 /usr/local/bin,故 chroot 内在位。
# 脚本执行后自删,不进装好的系统(一次性安装器助手,同 gigos-fix-crypttab.sh)。
---
# 在目标系统(chroot)内执行,ROOT=/
dontChroot: false
# 含 dracut --regenerate-all + generate-zbm,重操作 → 给足超时(与 LUKS 修复同 600s 预算)
timeout: 600
script:
    - command: "-test -x /usr/local/bin/gigos-zfs-bootmenu.sh && /usr/local/bin/gigos-zfs-bootmenu.sh"
      timeout: 600

# 进度条里的步骤名
i18n:
    name: "Configuring ZFSBootMenu for ZFS root"
    name[zh_CN]: "为 ZFS 根配置 ZFSBootMenu"
    name[zh_TW]: "為 ZFS 根配置 ZFSBootMenu"
