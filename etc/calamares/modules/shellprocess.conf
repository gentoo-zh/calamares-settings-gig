# SPDX-License-Identifier: CC0-1.0
#
# Configuration for the shell process job.
#
# Executes a list of commands found under the key *script*.
# If the top-level key *dontChroot* is true, then the commands
# are executed in the context of the live system, otherwise
# in the context of the target system. In all of the commands,
# the following variable expansions will take place:
#  - `ROOT` is replaced by the root mount point of the **target**
#    system from the point of view of the command (when run in the target
#    system, e.g. when *dontChroot* is false, that will be `/`).
#  - `USER` is replaced by the username, set on the user page.
#  - `LANG` is replaced by the language chosen for the user-interface
#    of Calamares, set on the welcome page. This may not reflect the
#    chosen system language from the locale page.
#
# Variables are written as `${var}`, e.g. `${ROOT}`.
# Write `$$` to get a shell-escaped `\$` in the shell command.
# It is not possible to get an un-escaped `$` in the shell command
# (either the command will fail because of undefined variables, or
# you get a shell-escaped `\$`).
#
# The (global) timeout for the command list can be set with
# the *timeout* key. The value is a time in seconds, default
# is 30 seconds if not set. The timeout **must** be tuned, either
# globally or per-command (see below in the description of *script*),
# to the load or expected running-time of the command.
#
#  - Setting a timeout of 30 for a `touch` command is probably exessive
#  - Setting a timeout of 1 for a `touch` command might be low,
#    on a slow disk where touch needs to be loaded from CDROM
#  - Setting a timeout of 30 for a 1GB download is definitely low
#  - Setting a timeout of 3600 for a 1GB download is going to leave
#    the user in uncertainty for a loooong time.
#
# If a command starts with "-" (a single minus sign), then the
# return value of the command following the - is ignored; otherwise,
# a failing command will abort the installation. This is much like
# make's use of - in a command.
#
# The value of *script* may be:
#   - a single string; this is one command that is executed.
#   - a single object (see below).
#   - a list of items; these are executed one at a time, by
#     separate shells (/bin/sh -c is invoked for each command).
#     Each list item may be:
#     - a single string; this is one command that is executed.
#     - a single object, specifying a key *command* and (optionally)
#       a key *timeout* to set the timeout for this specific
#       command differently from the global setting. An optional
#       key *environment* is a list of strings to put into the
#       environment of the command.
#
# Using a single object is not generally useful because the same effect
# can be obtained with a single string and a global timeout, except
# when the command needs environment-settings. When there are
# multiple commands to execute, one of them might have
# a different timeout than the others.
#
# The environment strings should all be "KEY='some value'" strings,
# as if they can be typed into the shell. Quoting the environment
# strings with "" in YAML is recommended. Adding the '' quotes ensures
# that the value will not be interpreted by the shell. Writing
# environment strings is the same as placing `export KEY='some value' ;`
# in front of the *command*.
#
# Calamares variable expansion is **also** done on the environment strings.
# Write `$$` to get a literal `$` in the shell command.
#
# To change the description of the job, set the *name* entries in *i18n*.
---
# Set to true to run in host, rather than target system
dontChroot: false
timeout: 30

# 装机后处理:在目标系统里清理 live 专用残留,并修几处装好系统的开机问题。
# live 为「开箱即用 + 装机便利」加了一堆免登/免密/调试入口和构建期 hack,
# 这些绝不能进装好的系统(安全洞 + 脏交付)。逐项删除;gigos-cpuflags 保留给目标系统。
script:
    # SDDM 自动登录:live 直达桌面靠 .d/kde_settings.conf 的 [Autologin](优先级高于 displaymanager
    # 写的 base /etc/sddm.conf);两处都清,否则装好系统残留免登 live 用户。
    - "-rm -f ${ROOT}/etc/sddm.conf.d/kde_settings.conf"
    - "-test -f ${ROOT}/etc/sddm.conf && sed -i '/^\\[Autologin\\]/,/^\\[/{/^\\[/!d;/^\\[Autologin\\]/d}' ${ROOT}/etc/sddm.conf"
    # live 专用「开机选语言」服务(读 gigos.lang= 内核参数);装好系统不传该参数,删干净。
    - "-rm -f ${ROOT}/etc/systemd/system/gigos-live-lang.service ${ROOT}/usr/local/bin/gigos-live-lang.sh"
    - "-rm -f ${ROOT}/etc/systemd/system/multi-user.target.wants/gigos-live-lang.service"
    # 95-gigos-lang.conf 写死 LANG=zh_CN,会盖过 Calamares 按所选 locale 写的 /etc/locale.conf
    # (非中文用户的 Firefox 等被强成中文);live 靠运行时的 96-* 覆盖,装好系统只剩 95,必须删。
    - "-rm -f ${ROOT}/etc/environment.d/95-gigos-lang.conf"
    # live 专用「常规加载闭源 nvidia」服务(读 gigos.gpu=nvidia);装好系统由 shellprocess@nvidia 另配,删。
    - "-rm -f ${ROOT}/etc/systemd/system/gigos-nvidia-load.service ${ROOT}/usr/local/bin/gigos-nvidia-load.sh"
    - "-rm -f ${ROOT}/etc/systemd/system/multi-user.target.wants/gigos-nvidia-load.service"
    # live 桌面调试按钮(skel 模板 + 已建用户副本)+ 各自脚本 + 按钮写下的提权口子,逐组清:
    #   ① calamares「安装系统」桌面图标 + 其 polkit 免密规则
    - "-rm -f ${ROOT}/etc/skel/Desktop/calamares.desktop"
    - "-rm -f ${ROOT}/home/*/Desktop/calamares.desktop"
    - "-rm -f ${ROOT}/etc/polkit-1/rules.d/49-calamares-nopasswd.rules"
    #   calamares 应用菜单项(随包自带,上面只删了桌面副本):留着能 pkexec 重装/格盘,删入口
    - "-rm -f ${ROOT}/usr/share/applications/calamares.desktop"
    #   ② 「启动 SSH」按钮 + 前后端脚本 + 可能写下的密码登录 drop-in
    - "-rm -f ${ROOT}/etc/skel/Desktop/gigos-ssh-password.desktop ${ROOT}/etc/skel/Desktop/gigos-ssh-keyonly.desktop"
    - "-rm -f ${ROOT}/home/*/Desktop/gigos-ssh-password.desktop ${ROOT}/home/*/Desktop/gigos-ssh-keyonly.desktop"
    - "-rm -f ${ROOT}/usr/local/bin/gigos-ssh.sh ${ROOT}/usr/local/bin/gigos-ssh-button.sh"
    - "-rm -f ${ROOT}/etc/ssh/sshd_config.d/00-gigos-passwordlogin.conf"
    #   ③ 「关闭自动休眠/锁屏」按钮 + 脚本;并复位 live 的电源/锁屏覆盖,装好系统回 KDE 默认(笔记本能待机省电)
    - "-rm -f ${ROOT}/etc/skel/Desktop/gigos-nosleep.desktop ${ROOT}/home/*/Desktop/gigos-nosleep.desktop"
    - "-rm -f ${ROOT}/usr/local/bin/gigos-nosleep.sh"
    - "-rm -f ${ROOT}/etc/skel/.config/powerdevilrc ${ROOT}/etc/skel/.config/kscreenlockerrc"
    - "-rm -f ${ROOT}/home/*/.config/powerdevilrc ${ROOT}/home/*/.config/kscreenlockerrc"
    #   ④ 「开启 sudo 免密」按钮 + 脚本 + 写下的 NOPASSWD drop-in(装好系统 sudo 必须要密码)
    - "-rm -f ${ROOT}/etc/skel/Desktop/gigos-sudo-nopasswd.desktop ${ROOT}/home/*/Desktop/gigos-sudo-nopasswd.desktop"
    - "-rm -f ${ROOT}/usr/local/bin/gigos-sudo.sh ${ROOT}/usr/local/bin/gigos-sudo-button.sh"
    - "-rm -f ${ROOT}/etc/sudoers.d/00-gigos-nopasswd"
    # 构建期 hack:include-squashfs 用空文件遮蔽内核安装的 chroot 检查(好让 chroot 内 emerge 内核能写 /boot)。
    # 纯构建用,删除恢复 kernel-install 原生行为。
    - "-rm -f ${ROOT}/etc/kernel/install.d/05-check-chroot.install"
    # 安装器善后:从 @world 取消选定 calamares(用户日后 emerge --depclean 连专属依赖一并清)。
    # 不用 emerge -C:squashfs 无 portage 树,首次 sync 前任何 emerge 操作都会被拒 → 直接 sed 删 world 行(与树无关)。
    - "-sed -i '/calamares/d' ${ROOT}/var/lib/portage/world"
    # vconsole:Calamares 选中文写 KEYMAP=cn,但 Linux 控制台无 cn keymap → loadkeys 失败、整机 degraded。
    # 中文控制台用 us(CJK 靠 IME 不靠 console),改 cn→us 消除 degraded。
    - "-sed -i 's/^KEYMAP=cn/KEYMAP=us/' ${ROOT}/etc/vconsole.conf"
    # LUKS 加密安装开机卡死根治(QEMU 实测验证):加密根由 initramfs 解锁(cmdline rd.luks.uuid),但真实根
    # systemd 不知它已被 initrd 挂接,死等其 .device 单元 →「A start job is running ... (no limit)」(卡 3 个点)。
    # gigos-fix-crypttab.sh 给挂载 / 或 /usr 的加密卷的 crypttab 条目加 x-initrd.attach(非 root 如 /home 不加),
    # 再重建 initramfs。判据按 fstab 根设备 UUID 定 root——gig 的 Calamares 把 root 密钥字段写成 none(fstab
    # 模块早于 luksbootkeyfile),故不能按 crypto_keyfile 判。用脚本而非内联 sed:绕开 Calamares 宏对 $/$() 的处理。
    # 脚本含 dracut --regenerate-all 故给足超时;脚本执行后自删,不进装好的系统。
    - command: "-test -x /usr/local/bin/gigos-fix-crypttab.sh && /usr/local/bin/gigos-fix-crypttab.sh"
      timeout: 600

# Script may be a single string (because false returns an error exit
# code, this will trigger a failure in the installation):
#
# script: "/usr/bin/false"

# Script may be a list of strings (because false returns an error exit
# code, **but** the command starts with a "-", the error exit is
# ignored and installation continues):
#
# script:
#     - "-/usr/bin/false"
#     - "/bin/ls"
#     - "/usr/bin/true"

# Script may be a list of items (if the touch command fails, it is
# ignored; the slowloris command has a different timeout from the
# other commands in the list):
#script:
#    - "-touch ${ROOT}/tmp/thingy"
#    - "/usr/bin/true"
#    - command: "/usr/local/bin/slowloris"
#      timeout: 3600

# You can change the description of the job (as it is displayed in the
# progress bar during installation) by defining an *i18n* key, which
# has a *name* field and optionally, translations as *name[lang]*.
#
# Without a translation here, the default name from the source code
# is used, "Shell Processes Job".
#
# i18n:
#     name: "Shell process"
#     name[nl]: "Schelpenpad"
#     name[en_GB]: "Just a moment"
#script:
#     - "installkernel"
#     - "-if [ -d /sys/firmware/efi/efivars ];then mkdir -p /boot/efi/$(systemd-machine-id-setup --print)/$(uname -r);fi"
