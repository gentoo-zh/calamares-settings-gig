---
# 装机后 nvidia 配置(半自动,跟随用户在 live 的选择)。
# 仅当:① 机器有 NVIDIA 显卡 且 ② 用户在 live grub 选了「闭源 NVIDIA 驱动」项
# (该项传 modprobe.blacklist=nouveau,装机时 /proc 已 bind 进目标,chroot 内可读 live cmdline)
# 才给装好的系统写 nvidia DRM modeset drop-in。否则什么都不做——自动保护
# A/I 卡、Optimus 笔记本、以及故意用 nouveau 的用户。
#
# 不写 grub 内核参数(现代 nvidia 驱动默认开 modeset,modprobe.d 更干净持久);
# 不额外 blacklist nouveau(nvidia-drivers ebuild 自带的 /etc/modprobe.d/nvidia.conf
# 已处理);不跑 dracut --force(重操作易超时,早期 KMS 由 ISO 出厂 initramfs 负责)。
# 用 > 覆盖写保证幂等。
dontChroot: false
timeout: 30
script:
    # 无 NVIDIA 显卡(vendor 0x10de)则直接退出,不动任何配置
    - "-grep -qil 0x10de /sys/bus/pci/devices/*/vendor || exit 0"
    # 用户在 live 没选闭源 nvidia 项(cmdline 无 blacklist=nouveau)则不配,保持默认
    - "-grep -q 'modprobe.blacklist=nouveau' /proc/cmdline || exit 0"
    # 有 N 卡 + 用户选了闭源:写 modeset drop-in(幂等覆盖)
    - "-printf 'options nvidia_drm modeset=1\\n' > ${ROOT}/etc/modprobe.d/nvidia-modeset.conf"
